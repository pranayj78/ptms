name: ADR Compliance Review

on:
  push:
    paths:
      - 'python/src/**'
      - 'docs/adr/**'
      - 'docs/rfcs/**'
      - 'scripts/**'
      - '.github/workflows/adr-review.yml'
  pull_request:
    paths:
      - 'python/src/**'
      - 'docs/adr/**'
      - 'docs/rfcs/**'
      - 'scripts/**'
      - '.github/workflows/adr-review.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Run ADR compliance review
        run: uv run python scripts/adr_review.py --output review.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: adr-review-report
          path: review.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = fs.readFileSync('review.md', 'utf8');

            if (body.length > 65536) {
              body = body.slice(0, 65530) + '\n\n... (truncated)';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
